# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE — copy this file and replace every TODO marker.
#
# Steps:
#   1. cp _service-template.yml {service-name}-ci.yml
#   2. Replace all TODO values below
#   3. Add service to docker-compose.microservices.yml with image: ${SERVICE_IMAGE:-...}
# ─────────────────────────────────────────────────────────────────────────────

name: TODO-service-name CI/CD   # e.g. "User Service CI/CD"

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/TODO-service-dir/**'           # e.g. services/user-service/**
      - 'services/hrms-common/**'                # rebuild if shared lib changes
      - '.github/workflows/TODO-workflow-file'   # this file
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/TODO-service-dir/**'
      - 'services/hrms-common/**'

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/TODO-image-name   # e.g. hrms-user-service

jobs:

  test:
    name: Test & Build
    runs-on: ubuntu-latest

    # Remove this block if the service has no database
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hrms_test
          POSTGRES_USER: hrms_user
          POSTGRES_PASSWORD: hrms_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # Install hrms-common into local Maven repo before building the service
      - name: Install hrms-common
        working-directory: services/hrms-common
        run: mvn install -DskipTests -q

      - name: Build & test
        working-directory: services/TODO-service-dir
        run: mvn verify
        env:
          DB_URL: jdbc:postgresql://localhost:5432/hrms_test
          DB_USERNAME: hrms_user
          DB_PASSWORD: hrms_pass
          SPRING_PROFILE: test
          JWT_SECRET: test-secret-key-min-32-characters-long!

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TODO-service-name-test-results
          path: services/TODO-service-dir/target/surefire-reports/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: TODO-service-name-jar
          path: services/TODO-service-dir/target/*.jar

  docker:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/TODO-service-dir
          file: services/TODO-service-dir/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy to Production
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://hrms.nursnerv.uk

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            IMAGE=$(echo "ghcr.io/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
            CONTAINER=TODO-container-name   # e.g. hrms-user-service
            cd ~/hrms
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:main
            TODO_SERVICE_IMAGE=$IMAGE:main docker compose --profile production -f docker-compose.microservices.yml up -d --no-deps TODO-compose-service-name

            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER 2>/dev/null || echo "unknown")
              echo "  Attempt $i/12 — $STATUS"
              [ "$STATUS" = "healthy" ] && echo "✓ Deployed $CONTAINER!" && break
              [ $i -eq 12 ] && docker logs $CONTAINER --tail 30 && exit 1
              sleep 10
            done
            docker image prune -f

  deploy-staging:
    name: Deploy to Staging
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            IMAGE=$(echo "ghcr.io/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
            CONTAINER=TODO-container-name
            cd ~/hrms-staging
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:develop
            TODO_SERVICE_IMAGE=$IMAGE:develop docker compose -f docker-compose.microservices.yml up -d --no-deps TODO-compose-service-name

            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER 2>/dev/null || echo "unknown")
              echo "  Attempt $i/12 — $STATUS"
              [ "$STATUS" = "healthy" ] && echo "✓ Staging $CONTAINER deployed!" && break
              [ $i -eq 12 ] && docker logs $CONTAINER --tail 30 && exit 1
              sleep 10
            done
            docker image prune -f
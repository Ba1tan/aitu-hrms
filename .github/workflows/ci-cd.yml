name: HRMS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'docker/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'docker/**'
      - '.github/workflows/ci-cd.yml'
jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Test & Build
  # Runs on every push and every pull request
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hrms_test
          POSTGRES_USER: hrms_user
          POSTGRES_PASSWORD: hrms_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build & test
        run: mvn verify
        env:
          DB_URL: jdbc:postgresql://localhost:5432/hrms_test
          DB_USERNAME: hrms_user
          DB_PASSWORD: hrms_pass
          SPRING_PROFILE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # Only on push to main or develop (not on pull requests)
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Production
  # Only on push to main
  # ───────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://hrms.nursnerv.uk

    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          # Production deploy job
          script: |
            IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            cd ~/hrms
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:main
            docker compose -f docker/docker-compose.prod.yml up -d --no-deps app

            echo "Waiting for app to become healthy..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' hrms-app 2>/dev/null || echo "unknown")
              echo "  Attempt $i/12 — status: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✓ Production deployment successful!"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "✗ Health check failed after 2 minutes — check logs:"
                docker logs hrms-app --tail 30
                exit 1
              fi
              sleep 10
            done

            docker image prune -f
            echo "Deployed at: $(date)"

  # ───────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy to Staging
  # Only on push to develop
  # ───────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment:
      name: staging
      url: http://192.168.100.53:8091

    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            cd ~/hrms-staging
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:develop
            docker compose -f docker/docker-compose.staging.yml up -d --no-deps app

            echo "Waiting for staging app to become healthy..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' hrms-app-staging 2>/dev/null || echo "unknown")
              echo "  Attempt $i/12 — status: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✓ Staging deployment successful!"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "✗ Staging health check failed — check logs:"
                docker logs hrms-app-staging --tail 30
                exit 1
              fi
              sleep 10
            done

            docker image prune -f
            echo "Staging deployed at: $(date)"
name: Monolith CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'monolith/**'
      - 'docker-compose.microservices.yml'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'monolith/**'
      - '.github/workflows/ci-cd.yml'

env:
  JAVA_VERSION: '17'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/hrms-monolith

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Test & Build
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hrms_test
          POSTGRES_USER: hrms_user
          POSTGRES_PASSWORD: hrms_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build & test
        working-directory: monolith
        run: mvn verify
        env:
          DB_URL: jdbc:postgresql://localhost:5432/hrms_test
          DB_USERNAME: hrms_user
          DB_PASSWORD: hrms_pass
          SPRING_PROFILE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monolith-test-results
          path: monolith/target/surefire-reports/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: monolith-jar
          path: monolith/target/*.jar

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: monolith
          file: monolith/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Production  (main only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://hrms.nursnerv.uk

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            IMAGE=$(echo "ghcr.io/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
            cd ~/hrms
            git pull origin main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:main
            MONOLITH_IMAGE=$IMAGE:main docker compose --profile production -f docker-compose.microservices.yml up -d --no-deps monolith

            echo "Waiting for monolith to become healthy..."
            CID=$(docker compose -f docker-compose.microservices.yml ps -q monolith)
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $CID 2>/dev/null || echo "unknown")
              echo "  Attempt $i/12 — $STATUS"
              [ "$STATUS" = "healthy" ] && echo "✓ Monolith deployed!" && break
              [ $i -eq 12 ] && docker logs $CID --tail 30 && exit 1
              sleep 10
            done
            docker image prune -f

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy to Staging  (develop only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            IMAGE=$(echo "ghcr.io/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
            cd ~/hrms-staging
            git pull origin develop
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:develop
            MONOLITH_IMAGE=$IMAGE:develop docker compose -f docker-compose.microservices.yml up -d --no-deps monolith

            echo "Waiting for monolith to become healthy..."
            CID=$(docker compose -f docker-compose.microservices.yml ps -q monolith)
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $CID 2>/dev/null || echo "unknown")
              echo "  Attempt $i/12 — $STATUS"
              [ "$STATUS" = "healthy" ] && echo "✓ Staging monolith deployed!" && break
              [ $i -eq 12 ] && docker logs $CID --tail 30 && exit 1
              sleep 10
            done
            docker image prune -f
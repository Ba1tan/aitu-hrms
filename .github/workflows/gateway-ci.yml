name: API Gateway CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/api-gateway/**'
      - 'docker-compose.microservices.yml'
      - '.github/workflows/gateway-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/api-gateway/**'
      - '.github/workflows/gateway-ci.yml'

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/hrms-gateway

jobs:


  # Job 1: Test & Build  (no DB — gateway is stateless)
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build & test
        working-directory: services/api-gateway
        run: mvn verify
        env:
          # Minimal config so context loads without a real Redis
          SPRING_DATA_REDIS_HOST: localhost
          APP_JWT_SECRET: test-secret-key-min-32-characters-long!

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-test-results
          path: services/api-gateway/target/surefire-reports/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: services/api-gateway/target/*.jar


  # Job 2: Build & Push Docker Image
  docker:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: gateway-jar
          path: services/api-gateway/target/

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/api-gateway
          file: services/api-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # Job 3: Deploy to Production  (main only)
  deploy-production:
    name: Deploy to Production
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://hrms.nursnerv.uk

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            IMAGE=$(echo "ghcr.io/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
            cd ~/hrms
            git pull origin main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:main
            GATEWAY_IMAGE=$IMAGE:main docker compose -f docker-compose.microservices.yml up -d --no-deps gateway

            echo "Waiting for gateway to become healthy..."
            for i in $(seq 1 8); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' hrms-gateway 2>/dev/null || echo "unknown")
              echo "  Attempt $i/8 — $STATUS"
              [ "$STATUS" = "healthy" ] && echo "✓ Gateway deployed!" && break
              [ $i -eq 8 ] && docker logs hrms-gateway --tail 30 && exit 1
              sleep 10
            done
            docker image prune -f

  # Job 4: Deploy to Staging  (develop only)
  deploy-staging:
    name: Deploy to Staging
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment:
      name: staging
      url: http://192.168.100.53:8091

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            IMAGE=$(echo "ghcr.io/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
            cd ~/hrms-staging
            git pull origin develop
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE:develop
            GATEWAY_IMAGE=$IMAGE:develop docker compose -f docker-compose.microservices.yml up -d --no-deps gateway

            echo "Waiting for gateway to become healthy..."
            for i in $(seq 1 8); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' hrms-gateway 2>/dev/null || echo "unknown")
              echo "  Attempt $i/8 — $STATUS"
              [ "$STATUS" = "healthy" ] && echo "✓ Staging gateway deployed!" && break
              [ $i -eq 8 ] && docker logs hrms-gateway --tail 30 && exit 1
              sleep 10
            done
            docker image prune -f

services:

  postgres:
    image: postgres:16-alpine
    container_name: hrms-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"   # different host port from production (5432)
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - hrms-staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hrms-redis-staging
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1
    ports:
      - "6380:6379"   # different host port from production (6379)
    volumes:
      - redis_staging_data:/data
    networks:
      - hrms-staging-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/${GITHUB_REPO}:develop
    container_name: hrms-app-staging
    restart: unless-stopped
    ports:
      - "8091:8080"   # different host port from production (8090)
    environment:
      SPRING_PROFILE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8080
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    networks:
      - hrms-staging-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3


  frontend:
    image: ghcr.io/${GITHUB_REPO}/hrms-frontend:develop
    container_name: hrms-frontend-staging
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - hrms-staging-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/" ]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  postgres_staging_data:
  redis_staging_data:

networks:
  hrms-staging-network:
    driver: bridge
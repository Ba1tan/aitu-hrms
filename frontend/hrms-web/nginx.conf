server {
    listen 80;
    root /var/www/hrms-frontend;
    index index.html;



    # Proxy API calls to backend.
    # Forward the real client IP both as X-Real-IP and appended to
    # X-Forwarded-For — otherwise the gateway only sees this container's IP
    # (172.x) and audit logs / login tracking record that instead.
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
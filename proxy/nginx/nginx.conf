events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Real client IP recovery ──────────────────────────────────────────
    # This nginx sits behind NPM (TLS termination), which already sets
    # X-Forwarded-For / X-Real-IP to the actual visitor. Trust those private
    # upstream hops and rewrite $remote_addr to the real client, so the
    # X-Real-IP we forward to the gateway, the audit-log IP, AND the per-IP
    # rate-limit buckets below all key off the visitor — not NPM's address
    # (172.x). Without this we overwrite X-Real-IP with $remote_addr=NPM.
    set_real_ip_from 172.16.0.0/12;   # Docker bridge networks (NPM <-> nginx)
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    upstream hrms_backend {
        server gateway:8080;
        keepalive 32;
    }

    upstream hrms_frontend {
        server frontend:80;
        keepalive 16;
    }

    server {
        listen 80;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://hrms_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

         # Swagger UI for extracted services (routed to gateway).
         # Consider restricting with `allow`/`deny` or basic auth in production.
        location /user-api/ {
            proxy_pass         http://hrms_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
        location /employee-api/ {
            proxy_pass         http://hrms_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }


        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://hrms_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        location / {
            proxy_pass         http://hrms_frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
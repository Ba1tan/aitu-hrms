server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      # Remove duplicate CORS headers added by both gateway and downstream
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            key-resolver: "#{@userKeyResolver}"

      # ---------------------------------------------------------------
      # MIGRATION PHASE: all routes proxy to the monolith at :8081.
      # As each service is extracted, replace the uri for that route.
      # ---------------------------------------------------------------
      routes:
        - id: auth
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**

        - id: users
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**

        - id: employees
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/employees/**,/api/v1/departments/**,/api/v1/positions/**

        - id: attendance
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/attendance/**

        - id: leave
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/leave/**

        - id: payroll
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/payroll/**

        - id: ai
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/ai/**

        - id: reports
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/reports/**

        - id: notifications
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/notifications/**

        - id: integration
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/integration/**,/api/v1/settings/**

        - id: dashboard
          uri: ${MONOLITH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/dashboard/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: ${CORS_ORIGINS:https://hrms.nursnerv.uk,http://localhost:5173}
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-32-chars!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.springframework.cloud.gateway: INFO
    kz.aitu.hrms.gateway: DEBUG
server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      # Remove duplicate CORS headers added by both gateway and downstream
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            key-resolver: "#{@userKeyResolver}"

      # ---------------------------------------------------------------
      # All traffic is routed to per-service hostnames. Routes for services
      # that are not yet implemented (ai-ml, reporting, notification,
      # integration-hub) are pre-wired to their planned URIs — they return
      # 502/connection-refused until the underlying service comes up.
      # ---------------------------------------------------------------
      routes:
        - id: user-service-swagger
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/user-api/swagger-ui/**,/user-api/swagger-ui.html,/user-api/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: auth
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: users
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=1

        - id: employee-service-swagger
          uri: ${EMPLOYEE_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/employee-api/swagger-ui/**,/employee-api/swagger-ui.html,/employee-api/v3/api-docs/**
          filters:
            - RewritePath=/employee-api/(?<segment>.*), /api/$\{segment}
            - AddRequestHeader=X-Forwarded-Prefix, /employee-api

        - id: employee-service
          uri: ${EMPLOYEE_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/employees/**,/api/v1/departments/**,/api/v1/positions/**

        - id: attendance-service-swagger
          uri: ${ATTENDANCE_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/attendance-api/swagger-ui/**,/attendance-api/swagger-ui.html,/attendance-api/v3/api-docs/**
          filters:
            - RewritePath=/attendance-api/(?<segment>.*), /api/$\{segment}
            - AddRequestHeader=X-Forwarded-Prefix, /attendance-api

        - id: attendance
          uri: ${ATTENDANCE_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/attendance/**

        - id: leave-service-swagger
          uri: ${LEAVE_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/leave-api/swagger-ui/**,/leave-api/swagger-ui.html,/leave-api/v3/api-docs/**
          filters:
            - RewritePath=/leave-api/(?<segment>.*), /api/$\{segment}
            - AddRequestHeader=X-Forwarded-Prefix, /leave-api

        - id: leave
          uri: ${LEAVE_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/leave/**

        - id: payroll-service-swagger
          uri: ${PAYROLL_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/payroll-api/swagger-ui/**,/payroll-api/swagger-ui.html,/payroll-api/v3/api-docs/**
          filters:
            - RewritePath=/payroll-api/(?<segment>.*), /api/$\{segment}
            - AddRequestHeader=X-Forwarded-Prefix, /payroll-api

        - id: payroll
          uri: ${PAYROLL_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/payroll/**

        - id: ai
          uri: ${AI_ML_SERVICE_URI:http://localhost:8086}
          predicates:
            - Path=/api/v1/ai/**

        - id: reports
          uri: ${REPORTING_SERVICE_URI:http://localhost:8087}
          predicates:
            - Path=/api/v1/reports/**

        - id: notifications
          uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8088}
          predicates:
            - Path=/api/v1/notifications/**

        - id: integration
          uri: ${INTEGRATION_HUB_URI:http://localhost:8089}
          predicates:
            - Path=/api/v1/integration/**,/api/v1/settings/**

        # Dashboard is a JSON aggregation served by reporting-service (see services/reporting-service/CLAUDE.md).
        - id: dashboard
          uri: ${REPORTING_SERVICE_URI:http://localhost:8087}
          predicates:
            - Path=/api/v1/dashboard/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: ${CORS_ORIGINS:https://hrms.nursnerv.uk,http://localhost:5173}
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-32-chars!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.springframework.cloud.gateway: INFO
    kz.aitu.hrms.gateway: INFO
server:
  port: 0

spring:
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:h2:mem:employee-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  jwt:
    secret: dGVzdC1zZWNyZXQtMzItYnl0ZXMtbWluaW11bS1saW5lLWxlbmd0aC0xMjM0NTY3ODk=
  storage:
    base-path: /tmp/hrms-test-uploads
  services:
    user-service-uri: http://localhost:8081
    ai-ml-service-uri: http://localhost:8086
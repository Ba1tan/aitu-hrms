server:
  port: 8089
  servlet:
    context-path: /api
  # Honor X-Forwarded-* from the edge proxy/gateway so request.getRemoteAddr()
  # (and audit IP capture) resolves to the real client, not the Docker peer.
  forward-headers-strategy: framework

spring:
  application:
    name: integration-hub
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hrms}
    username: ${DB_USER:hrms}
    password: ${DB_PASS:hrms}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: hrms_integration
        jdbc.time_zone: Asia/Almaty
    show-sql: false
  flyway:
    enabled: true
    default-schema: hrms_integration
    schemas: hrms_integration
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: NON_NULL
    time-zone: Asia/Almaty

app:
  jwt:
    secret: ${JWT_SECRET:dGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdA==}

employee-service:
  url: ${EMPLOYEE_SERVICE_URL:http://localhost:8082}
payroll-service:
  url: ${PAYROLL_SERVICE_URL:http://localhost:8085}

integration:
  service-token: ${INTEGRATION_SERVICE_TOKEN:dev-secret-change-me}
  onec:
    connect-timeout-seconds: 10
    read-timeout-seconds: 60

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 30000

resilience4j:
  circuitbreaker:
    instances:
      onec:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: db,diskSpace,ping
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    redis:
      enabled: false
    rabbit:
      enabled: false

logging:
  level:
    kz.aitu.hrms.integration: INFO
    org.springframework.amqp: WARN

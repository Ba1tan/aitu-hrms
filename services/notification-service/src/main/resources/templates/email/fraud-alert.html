<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8"/>
  <title>Подозрение на мошенничество</title>
</head>
<body style="font-family:Arial,sans-serif;background:#f4f5f7;margin:0;padding:0;">
  <div style="max-width:600px;margin:0 auto;background:#ffffff;border-radius:8px;overflow:hidden;">
    <div style="background:#ea4335;color:#fff;padding:20px;font-size:22px;">
      🚨 HRMS — Подозрение на мошенничество
    </div>
    <div style="padding:24px;color:#222;line-height:1.6;font-size:15px;">
      <p>Обнаружена подозрительная активность при фиксации посещаемости.</p>
      <table style="margin:16px 0;border-collapse:collapse;">
        <tr>
          <td style="padding:8px 12px;background:#f0f1f3;">Оценка риска</td>
          <td style="padding:8px 12px;" th:text="${fraudScore}">0.95</td>
        </tr>
        <tr>
          <td style="padding:8px 12px;background:#f0f1f3;">Признаки</td>
          <td style="padding:8px 12px;" th:text="${flags}">SPOOFED_LOCATION</td>
        </tr>
      </table>
      <p>Немедленно проверьте случай в системе HRMS.</p>
    </div>
    <div style="padding:16px;background:#f4f5f7;color:#999;font-size:12px;text-align:center;">
      Это автоматическое сообщение, не отвечайте на него.
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8"/>
  <title>Сброс пароля — HRMS</title>
</head>
<body style="font-family:Arial,sans-serif;background:#f4f5f7;margin:0;padding:0;">
  <div style="max-width:600px;margin:0 auto;background:#ffffff;border-radius:8px;overflow:hidden;">
    <div style="background:#1a73e8;color:#fff;padding:20px;font-size:22px;">
      HRMS — Сброс пароля
    </div>
    <div style="padding:24px;color:#222;line-height:1.6;font-size:15px;">
      <p>Здравствуйте, <strong th:text="${firstName}">Иван</strong>!</p>
      <p>Мы получили запрос на сброс пароля для вашей учётной записи.</p>
      <p>
        <a th:href="${resetUrl}"
           style="display:inline-block;padding:10px 22px;background:#1a73e8;color:#fff;text-decoration:none;border-radius:4px;">
          Сбросить пароль
        </a>
      </p>
      <p style="color:#888;font-size:13px;">
        Ссылка действительна <span th:text="${ttlSeconds / 3600}">24</span> ч.
        Если вы не запрашивали сброс пароля — проигнорируйте это письмо.
      </p>
    </div>
    <div style="padding:16px;background:#f4f5f7;color:#999;font-size:12px;text-align:center;">
      Это автоматическое сообщение, не отвечайте на него.
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8"/>
  <title>Аномалия в расчёте зарплаты</title>
</head>
<body style="font-family:Arial,sans-serif;background:#f4f5f7;margin:0;padding:0;">
  <div style="max-width:600px;margin:0 auto;background:#ffffff;border-radius:8px;overflow:hidden;">
    <div style="background:#fbbc04;color:#222;padding:20px;font-size:22px;">
      ⚠️ HRMS — Аномалия в расчёте зарплаты
    </div>
    <div style="padding:24px;color:#222;line-height:1.6;font-size:15px;">
      <p>AI-система обнаружила аномалию в расчётном листе.</p>
      <table style="margin:16px 0;border-collapse:collapse;">
        <tr>
          <td style="padding:8px 12px;background:#f0f1f3;">Расчётный лист ID</td>
          <td style="padding:8px 12px;" th:text="${payslipId}">—</td>
        </tr>
        <tr>
          <td style="padding:8px 12px;background:#f0f1f3;">Оценка аномалии</td>
          <td style="padding:8px 12px;" th:text="${anomalyScore}">0.85</td>
        </tr>
      </table>
      <p>Проверьте и подтвердите расчёт в системе HRMS.</p>
    </div>
    <div style="padding:16px;background:#f4f5f7;color:#999;font-size:12px;text-align:center;">
      Это автоматическое сообщение, не отвечайте на него.
    </div>
  </div>
</body>
</html>

spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: ""
  datasource:
    url: jdbc:h2:mem:notification-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=MONTH,YEAR,DAY,VALUE;INIT=CREATE SCHEMA IF NOT EXISTS HRMS_NOTIFICATION
    username: sa
    password:
    driver-class-name: org.h2.Driver

app:
  jwt:
    secret: dGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdA==

notification:
  mail:
    enabled: false
  push:
    enabled: false
  service-token: test-token
  idempotency:
    ttl-hours: 24

employee-service:
  url: http://localhost:9999
user-service:
  url: http://localhost:9999
payroll-service:
  url: http://localhost:9999

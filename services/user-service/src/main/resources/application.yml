server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hrms?currentSchema=hrms_user}
    username: ${DB_USERNAME:hrms_user}
    password: ${DB_PASSWORD:hrms_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: hrms_user
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    default-schema: hrms_user
    schemas: hrms_user
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:hrms}
    password: ${RABBITMQ_PASS:hrms_pass}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: NON_NULL
    time-zone: Asia/Almaty

app:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}       # 15 min
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}  # 7 days

  security:
    lockout-minutes: ${LOCKOUT_MINUTES:30}

  password-reset:
    ttl-seconds: ${PWD_RESET_TTL:1800}  # 30 min

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    kz.aitu.hrms.user: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
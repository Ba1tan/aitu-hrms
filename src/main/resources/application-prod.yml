spring:
  jpa:
    show-sql: false
  flyway:
    clean-disabled: true  # NEVER clean in prod

server:
  ssl:
    enabled: false  # SSL terminated at Nginx level

logging:
  level:
    kz.aitu.hrms: INFO
    org.springframework.security: WARN
  file:
    name: /var/log/hrms/app.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

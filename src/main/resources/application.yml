spring:
  application:
    name: hrms-backend
  profiles:
    active: ${SPRING_PROFILE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hrms}
    username: ${DB_USERNAME:hrms_user}
    password: ${DB_PASSWORD:hrms_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: NON_NULL
    time-zone: Asia/Almaty

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-please}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}       # 15 min
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}  # 7 days

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

  payroll:
    # Kazakhstan tax rates 2024
    ipn-rate: 0.10          # ИПН - Individual Income Tax 10%
    opv-rate: 0.10          # ОПВ - Pension contribution 10%
    so-rate: 0.035          # СО - Social contribution 3.5%
    sn-rate: 0.095          # СН - Social tax 9.5%
    oopv-rate: 0.015        # ООПВ - OOPV 1.5%
    mrp: 3692               # МРП 2024 (tenge)
    min-wage: 85000         # Minimum wage 2024 (tenge)

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: HRMS API
    version: 1.0.0
    description: Human Resource Management System API for Kazakhstan SMBs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    kz.aitu.hrms: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
